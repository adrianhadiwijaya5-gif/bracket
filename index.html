<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>FIFA World Cup 2026 - Ultimate Bracket</title>
    <style>
        body { background: #060709; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        /* Papan Skor */
        .score-board-tv { display: flex; background: #000; padding: 15px 30px; border-radius: 20px; gap: 20px; align-items: center; border: 1px solid #333; margin-bottom: 10px; }
        .score-input { background: transparent; border: none; color: #0ff; font-size: 1.5rem; width: 50px; text-align: center; font-family: monospace; }
        .team-label { font-weight: bold; width: 50px; text-align: center; }
        
        /* Penalti */
        .penalty-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .penalty-indicator { width: 30px; height: 30px; border: 2px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #000; font-weight: bold; }
        .pen-success { background: #28a745; border-color: #28a745; color: white; }
        .pen-fail { background: #dc3545; border-color: #dc3545; color: white; }

        /* Bagan */
        .bracket { display: flex; gap: 20px; }
        .match-node { background: #151924; border: 1px solid #2b364f; padding: 10px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .team-slot { width: 60px; height: 40px; background: #090b12; border: 1px solid #444; margin: 2px; display: flex; align-items: center; justify-content: center; }
        
        .pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 5px; width: 80%; background: #0f121d; padding: 10px; }
    </style>
</head>
<body>

    <div class="score-board-tv">
        <div id="tv-team-l" class="team-label">---</div>
        <input type="number" class="score-input" id="score-l" value="0">
        <input type="text" id="match-timer" class="score-input" value="00:00" style="width: 80px; color: #ffd700;">
        <input type="number" class="score-input" id="score-r" value="0">
        <div id="tv-team-r" class="team-label">---</div>
    </div>

    <div class="penalty-container">
        <div class="penalty-indicator" onclick="penResult(this, 'O')" oncontextmenu="penResult(this, 'X'); return false;">-</div>
        <div class="penalty-indicator" onclick="penResult(this, 'O')" oncontextmenu="penResult(this, 'X'); return false;">-</div>
        <div class="penalty-indicator" onclick="penResult(this, 'O')" oncontextmenu="penResult(this, 'X'); return false;">-</div>
        <div class="penalty-indicator" onclick="penResult(this, 'O')" oncontextmenu="penResult(this, 'X'); return false;">-</div>
        <div class="penalty-indicator" onclick="penResult(this, 'O')" oncontextmenu="penResult(this, 'X'); return false;">-</div>
    </div>

    <div class="bracket" id="bracket-area">
        <!-- Contoh 1 Match -->
        <div class="match-node" onclick="selectMatch(this)">
            <div class="team-slot" data-code="---">?</div>
            <div class="team-slot" data-code="---">?</div>
        </div>
    </div>

    <div class="pool-grid" id="pool"></div>

    <script>
        // Autosave ke LocalStorage
        function save() {
            const state = {
                scoreL: document.getElementById('score-l').value,
                scoreR: document.getElementById('score-r').value,
                timer: document.getElementById('match-timer').value
            };
            localStorage.setItem('fifa_save', JSON.stringify(state));
        }

        // Papan Skor Dinamis
        function selectMatch(node) {
            const slots = node.querySelectorAll('.team-slot');
            document.getElementById('tv-team-l').innerText = slots[0].dataset.code;
            document.getElementById('tv-team-r').innerText = slots[1].dataset.code;
            save();
        }

        // Penalti
        function penResult(el, type) {
            el.innerText = type;
            el.className = 'penalty-indicator ' + (type === 'O' ? 'pen-success' : 'pen-fail');
        }

        // Input Listener untuk Autosave
        document.querySelectorAll('input').forEach(i => i.addEventListener('input', save));

        // Inisialisasi Database Negara (Contoh sebagian)
        const pool = document.getElementById('pool');
        ['id', 'us', 'fr', 'br', 'ar', 'de', 'jp', 'kr', 'es'].forEach(code => {
            pool.innerHTML += `<img src="https://flagcdn.com/w40/${code}.png" draggable="true" ondragstart="event.dataTransfer.setData('text', '${code.toUpperCase()}')">`;
        });

        // Drop Logic
        document.querySelectorAll('.team-slot').forEach(slot => {
            slot.ondragover = e => e.preventDefault();
            slot.ondrop = e => {
                const code = e.dataTransfer.getData('text');
                slot.innerText = code;
                slot.dataset.code = code;
            };
        });
    </script>
</body>
</html>

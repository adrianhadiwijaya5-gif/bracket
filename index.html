<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 Ultimate Bracket</title>
    <style>
        :root {
            --bg-color: #060709;
            --panel-bg: #0f121d;
            --card-bg: rgba(25, 29, 44, 0.45);
            --line-color: #2b364f;
            --line-glow: rgba(0, 240, 255, 0.2);
            --accent-cyan: #00f0ff;
            --accent-gold: #ffd700;
            --accent-red: #ff3b30;
            --text-color: #ffffff;
            --slot-width: 58px;
            --slot-height: 42px;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 40%, #111827 0%, var(--bg-color) 70%);
            color: var(--text-color);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: auto;
            user-select: none;
        }

        /* Top Control Panel */
        .control-panel {
            background: rgba(15, 18, 29, 0.85);
            backdrop-filter: blur(12px);
            padding: 12px 25px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 240, 255, 0.15);
            width: 90%;
            max-width: 1300px;
        }

        .control-panel input {
            background: #050609;
            border: 2px solid #2b364f;
            color: #fff;
            padding: 10px 16px;
            border-radius: 8px;
            outline: none;
            width: 180px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .control-panel input:focus { border-color: var(--accent-cyan); }

        /* Area Tong Sampah Interaktif */
        .trash-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 59, 48, 0.1);
            border: 2px dashed var(--accent-red);
            color: var(--accent-red);
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .trash-zone.drag-over-trash {
            background: rgba(255, 59, 48, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.4);
        }

        .btn-reset {
            background: #2b364f;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-left: auto;
            transition: background 0.2s;
        }
        .btn-reset:hover { background: var(--accent-red); }

        /* Arena Bracket */
        .bracket-arena {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
            width: 100%;
            max-width: 1650px;
        }

        #connector-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .side { display: flex; align-items: center; z-index: 2; }
        .column { display: flex; flex-direction: column; justify-content: space-around; height: 930px; gap: 6px; }
        .left-side .column { margin-right: 55px; }
        .right-side .column { margin-left: 55px; }

        .match-node {
            display: flex;
            flex-direction: column;
            background-color: var(--card-bg);
            border: 1px solid rgba(43, 54, 79, 0.4);
            border-radius: 12px;
            padding: 5px;
            gap: 5px;
        }

        /* Daun Asimetris */
        .team-slot {
            width: var(--slot-width);
            height: var(--slot-height);
            background: linear-gradient(135deg, #232a3d 0%, #151924 100%);
            border-radius: 16px 2px 16px 2px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .team-slot.active-target {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }

        .flag-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px 2px 14px 2px;
            cursor: grab;
        }

        .center-stage { display: flex; flex-direction: column; align-items: center; gap: 60px; z-index: 2; }

        .champion-podium {
            background: linear-gradient(135deg, #2b220d 0%, #111522 100%);
            border: 2px solid var(--accent-gold);
            border-radius: 20px;
            padding: 20px 35px;
            text-align: center;
        }

        .champion-podium .team-slot {
            width: 76px;
            height: 54px;
            border-radius: 22px 2px 22px 2px;
            border-color: var(--accent-gold);
        }
        .champion-podium .flag-img { border-radius: 20px 2px 20px 2px; }

        .bronze-box {
            text-align: center;
            background: rgba(15, 18, 29, 0.7);
            padding: 15px;
            border-radius: 14px;
            border: 1px solid #2b364f;
        }

        /* Database Pool */
        .pool-section {
            background-color: var(--panel-bg);
            border: 1px solid rgba(43, 54, 79, 0.7);
            border-radius: 16px;
            padding: 20px;
            width: 95%;
            max-width: 1450px;
            margin-top: 40px;
        }

        .pool-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

        .pool-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #161b29;
            padding: 6px;
            border-radius: 10px 2px 10px 2px;
            border: 1px solid #252e45;
        }

        .pool-flag { width: 48px; height: 34px; object-fit: cover; border-radius: 8px 2px 8px 2px; cursor: grab; }
        .pool-code { font-size: 0.65rem; color: #8fa0c2; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="control-panel">
        <input type="text" id="countryInput" placeholder="KODE TIM">
        
        <div class="trash-zone" id="trashBin">
            🗑️ DRAG SINI UNTUK HAPUS
        </div>

        <button class="btn-reset" onclick="resetBracket()">RESET SEMUA</button>
    </div>

    <div class="bracket-arena" id="arena">
        <svg id="connector-svg"></svg>

        <div class="side left-side">
            <div class="column">
                <div class="match-node"><div class="team-slot drop-zone" id="L-1-1">?</div><div class="team-slot drop-zone" id="L-1-2">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="L-1-3">?</div><div class="team-slot drop-zone" id="L-1-4">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="L-1-5">?</div><div class="team-slot drop-zone" id="L-1-6">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="L-1-7">?</div><div class="team-slot drop-zone" id="L-1-8">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="L-1-9">?</div><div class="team-slot drop-zone" id="L-1-10">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="L-1-11">?</div><div class="team-slot drop-zone" id="L-1-12">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="L-1-13">?</div><div class="team-slot drop-zone" id="L-1-14">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="L-1-15">?</div><div class="team-slot drop-zone" id="L-1-16">?</div></div>
            </div>
            <div class="column">
                <div class="match-node"><div class="team-slot drop-zone" id="L-2-1">?</div><div class="team-slot drop-zone" id="L-2-2">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="L-2-3">?</div><div class="team-slot drop-zone" id="L-2-4">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="L-2-5">?</div><div class="team-slot drop-zone" id="L-2-6">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="L-2-7">?</div><div class="team-slot drop-zone" id="L-2-8">?</div></div>
            </div>
            <div class="column">
                <div class="match-node"><div class="team-slot drop-zone" id="L-3-1">?</div><div class="team-slot drop-zone" id="L-3-2">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="L-3-3">?</div><div class="team-slot drop-zone" id="L-3-4">?</div></div>
            </div>
            <div class="column">
                <div class="match-node"><div class="team-slot drop-zone" id="L-4-1">?</div><div class="team-slot drop-zone" id="L-4-2">?</div></div>
            </div>
        </div>

        <div class="center-stage">
            <div class="champion-podium">
                <div style="font-size:0.75rem; font-weight:bold; letter-spacing:2px; margin-bottom:10px;">WORLD CHAMPION</div>
                <div class="team-slot drop-zone" id="CHAMP">🏆</div>
            </div>
            <div class="bronze-box">
                <div style="font-size:0.75rem; font-weight:bold; margin-bottom:8px;">BRONZE FINAL</div>
                <div class="match-node" style="flex-direction: row;">
                    <div class="team-slot drop-zone" id="B-1">?</div>
                    <div class="team-slot drop-zone" id="B-2">?</div>
                </div>
            </div>
        </div>

        <div class="side right-side">
            <div class="column">
                <div class="match-node"><div class="team-slot drop-zone" id="R-4-1">?</div><div class="team-slot drop-zone" id="R-4-2">?</div></div>
            </div>
            <div class="column">
                <div class="match-node"><div class="team-slot drop-zone" id="R-3-1">?</div><div class="team-slot drop-zone" id="R-3-2">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="R-3-3">?</div><div class="team-slot drop-zone" id="R-3-4">?</div></div>
            </div>
            <div class="column">
                <div class="match-node"><div class="team-slot drop-zone" id="R-2-1">?</div><div class="team-slot drop-zone" id="R-2-2">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="R-2-3">?</div><div class="team-slot drop-zone" id="R-2-4">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="R-2-5">?</div><div class="team-slot drop-zone" id="R-2-6">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="R-2-7">?</div><div class="team-slot drop-zone" id="R-2-8">?</div></div>
            </div>
            <div class="column">
                <div class="match-node"><div class="team-slot drop-zone" id="R-1-1">?</div><div class="team-slot drop-zone" id="R-1-2">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="R-1-3">?</div><div class="team-slot drop-zone" id="R-1-4">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="R-1-5">?</div><div class="team-slot drop-zone" id="R-1-6">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="R-1-7">?</div><div class="team-slot drop-zone" id="L-1-8">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="R-1-9">?</div><div class="team-slot drop-zone" id="R-1-10">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="R-1-11">?</div><div class="team-slot drop-zone" id="R-1-12">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="R-1-13">?</div><div class="team-slot drop-zone" id="R-1-14">?</div></div>
                <div class="match-node"><div class="team-slot drop-zone" id="R-1-15">?</div><div class="team-slot drop-zone" id="R-1-16">?</div></div>
            </div>
        </div>
    </div>

    <div class="pool-section">
        <div style="font-size:0.8rem; font-weight:bold; color:var(--accent-cyan); margin-bottom:15px; letter-spacing:1px;">🌐 DATABASE UTAMA (48 TIM PESERTA)</div>
        <div class="pool-grid" id="global-pool-grid"></div>
    </div>

    <script>
        // 48 Negara Peserta Lengkap
        const countriesList = [
            {c:"us", n:"USA"}, {c:"mx", n:"MEX"}, {c:"ca", n:"CAN"}, {c:"id", n:"IDN"}, {c:"br", n:"BRA"}, {c:"ar", n:"ARG"},
            {c:"fr", n:"FRA"}, {c:"de", n:"GER"}, {c:"gb-eng", n:"ENG"}, {c:"es", n:"ESP"}, {c:"pt", n:"POR"}, {c:"jp", n:"JPN"},
            {c:"kr", n:"KOR"}, {c:"nl", n:"NED"}, {c:"it", n:"ITA"}, {c:"ma", n:"MAR"}, {c:"hr", n:"CRO"}, {c:"be", n:"BEL"},
            {c:"uy", n:"URU"}, {c:"co", n:"COL"}, {c:"sa", n:"KSA"}, {c:"au", n:"AUS"}, {c:"sn", n:"SEN"}, {c:"cm", n:"CMR"},
            {c:"gh", n:"GHA"}, {c:"ch", n:"SUI"}, {c:"dk", n:"DEN"}, {c:"se", n:"SWE"}, {c:"no", n:"NOR"}, {c:"pl", n:"POL"},
            {c:"ua", n:"UKR"}, {c:"tr", n:"TUR"}, {c:"eg", n:"EGY"}, {c:"dz", n:"ALG"}, {c:"ng", n:"NGA"}, {c:"za", n:"RSA"},
            {c:"ir", n:"IRN"}, {c:"cl", n:"CHI"}, {c:"pe", n:"PER"}, {c:"ec", n:"ECU"}, {c:"py", n:"PAR"}, {c:"ve", n:"VEN"},
            {c:"nz", n:"NZL"}, {c:"cr", n:"CRC"}, {c:"jm", n:"JAM"}, {c:"tn", n:"TUN"}, {c:"qa", n:"QAT"}, {c:"at", n:"AUT"}
        ];

        let draggedFlagSrc = null;
        let draggedSourceSlotId = null; // Melacak asal slot yang di-drag
        let selectedSlot = null;

        // Render flags database
        const poolGrid = document.getElementById('global-pool-grid');
        countriesList.forEach(item => {
            const div = document.createElement('div');
            div.className = 'pool-item';
            div.innerHTML = `
                <img src="https://flagcdn.com/w80/${item.c}.png" class="pool-flag" draggable="true" data-type="pool">
                <div class="pool-code">${item.n}</div>
            `;
            poolGrid.appendChild(div);
        });

        // Slot click selector
        document.querySelectorAll('.drop-zone').forEach(slot => {
            slot.addEventListener('click', () => {
                document.querySelectorAll('.drop-zone').forEach(s => s.classList.remove('active-target'));
                selectedSlot = slot;
                slot.classList.add('active-target');
                document.getElementById('countryInput').focus();
            });
        });

        // Search bar enter input
        document.getElementById('countryInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && selectedSlot) {
                const targetCode = e.target.value.trim().toUpperCase();
                const found = countriesList.find(c => c.n === targetCode);
                if (found) {
                    setSlotImage(selectedSlot, `https://flagcdn.com/w80/${found.c}.png`);
                    e.target.value = '';
                }
            }
        });

        // Global Drag Start handler
        document.addEventListener('dragstart', (e) => {
            if (e.target.classList.contains('pool-flag')) {
                draggedFlagSrc = e.target.getAttribute('src');
                draggedSourceSlotId = null; // Berasal dari pool bawah
            } else if (e.target.classList.contains('flag-img')) {
                draggedFlagSrc = e.target.getAttribute('src');
                draggedSourceSlotId = e.target.closest('.drop-zone').id; // Berasal dari bagan
            }
        });

        // Drop Zone Event di dalam Bagan
        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('dragover', (e) => e.preventDefault());
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                if (draggedFlagSrc) {
                    setSlotImage(zone, draggedFlagSrc);
                    // Jika di-drag antar slot di dalam bagan, kosongkan slot lamanya
                    if (draggedSourceSlotId && draggedSourceSlotId !== zone.id) {
                        clearSlot(document.getElementById(draggedSourceSlotId));
                    }
                }
            });
        });

        // --- SISTEM DETEKSI DRAG TO DELETE (TONG SAMPAH) ---
        const trashBin = document.getElementById('trashBin');
        trashBin.addEventListener('dragover', (e) => {
            e.preventDefault();
            trashBin.classList.add('drag-over-trash');
        });
        trashBin.addEventListener('dragleave', () => {
            trashBin.classList.remove('drag-over-trash');
        });
        trashBin.addEventListener('drop', (e) => {
            e.preventDefault();
            trashBin.classList.remove('drag-over-trash');
            if (draggedSourceSlotId) {
                clearSlot(document.getElementById(draggedSourceSlotId));
                saveBracketState();
            }
        });

        function setSlotImage(slotElement, imgUrl) {
            slotElement.innerHTML = `<img src="${imgUrl}" class="flag-img" draggable="true">`;
            saveBracketState();
        }

        function clearSlot(slotElement) {
            if (slotElement) {
                slotElement.innerHTML = slotElement.id === 'CHAMP' ? '🏆' : '?';
            }
        }

        // Save & Load State Storage
        function saveBracketState() {
            const state = {};
            document.querySelectorAll('.drop-zone').forEach(slot => {
                const img = slot.querySelector('img');
                state[slot.id] = img ? img.getAttribute('src') : null;
            });
            localStorage.setItem('fifa2026_bracket_save', JSON.stringify(state));
        }

        function loadBracketState() {
            const savedData = localStorage.getItem('fifa2026_bracket_save');
            if (savedData) {
                const state = JSON.parse(savedData);
                Object.keys(state).forEach(id => {
                    const slot = document.getElementById(id);
                    if (slot && state[id]) {
                        slot.innerHTML = `<img src="${state[id]}" class="flag-img" draggable="true">`;
                    }
                });
            }
        }

        function resetBracket() {
            if (confirm("Reset ulang semua isi bagan turnamen?")) {
                localStorage.removeItem('fifa2026_bracket_save');
                document.querySelectorAll('.drop-zone').forEach(slot => {
                    clearSlot(slot);
                });
            }
        }

        // Jalur Garis Dinamis SVG
        function drawLines() {
            const svg = document.getElementById('connector-svg');
            if (!svg) return;
            svg.innerHTML = '';
            const arenaRect = document.getElementById('arena').getBoundingClientRect();

            const createTreePath = (fromArr, toArr) => {
                for(let i=0; i < fromArr.length; i++) {
                    const elA = document.getElementById(fromArr[i]);
                    const elB = document.getElementById(toArr[Math.floor(i/2)]);
                    if(elA && elB) {
                        const rA = elA.getBoundingClientRect(), rB = elB.getBoundingClientRect();
                        const x1 = (rA.left + rA.width/2) - arenaRect.left, y1 = (rA.top + rA.height/2) - arenaRect.top;
                        const x2 = (rB.left + rB.width/2) - arenaRect.left, y2 = (rB.top + rB.height/2) - arenaRect.top;
                        
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        const midX = x1 + (x2 - x1) / 2;
                        path.setAttribute('d', `M ${x1} ${y1} H ${midX} V ${y2} H ${x2}`);
                        path.setAttribute('stroke', 'var(--line-color)');
                        path.setAttribute('stroke-width', '2.5');
                        path.setAttribute('fill', 'none');
                        svg.appendChild(path);
                    }
                }
            };

            const leftR32 = []; for(let i=1; i<=16; i++) leftR32.push(`L-1-${i}`);
            const leftR16 = []; for(let i=1; i<=8; i++) leftR16.push(`L-2-${i}`);
            const leftQF = []; for(let i=1; i<=4; i++) leftQF.push(`L-3-${i}`);
            const leftSF = ['L-4-1', 'L-4-2'];

            const rightR32 = []; for(let i=1; i<=16; i++) rightR32.push(`R-1-${i}`);
            const rightR16 = []; for(let i=1; i<=8; i++) rightR16.push(`R-2-${i}`);
            const rightQF = []; for(let i=1; i<=4; i++) rightQF.push(`R-3-${i}`);
            const rightSF = ['R-4-1', 'R-4-2'];

            createTreePath(leftR32, leftR16); createTreePath(leftR16, leftQF); createTreePath(leftQF, leftSF);
            createTreePath(rightR32, rightR16); createTreePath(rightR16, rightQF); createTreePath(rightQF, rightSF);
        }

        window.addEventListener('load', () => { loadBracketState(); setTimeout(drawLines, 200); });
        window.addEventListener('resize', drawLines);
    </script>
</body>
</html>

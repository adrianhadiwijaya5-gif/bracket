<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Football Engine - Black Edition (193 Flags & Clubs)</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #121212;
            --card-bg: #181818;
            --line-color: #2c2c2c;
            --accent-gold: #ffffff; /* Putih/Silver bersih untuk tema hitam kontras */
            --accent-glow: #00ffff;
            --accent-red: #ff3b30;
            --text-color: #f5f5f5;
            --slot-width: 68px;
            --slot-height: 46px;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: auto;
            user-select: none;
        }

        .tabs-container {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 95%;
            max-width: 1500px;
            margin-bottom: 0;
            overflow-x: auto;
        }

        .tab-button {
            background: #0f0f0f;
            border: 1px solid var(--line-color);
            color: #777;
            padding: 10px 18px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: none;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab-button.active {
            background: var(--panel-bg);
            color: #fff;
            border-color: #444 #444 transparent #444;
            box-shadow: 0 -2px 10px rgba(255,255,255,0.05);
        }

        .btn-create-tab {
            background: transparent;
            border: 1px dashed #444;
            color: #aaa;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            white-space: nowrap;
        }
        .btn-create-tab:hover { border-color: #fff; color: #fff; }

        .tab-actions-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: 4px;
        }

        .action-tab-icon {
            font-size: 0.75rem;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .action-tab-icon.clear-bin { color: #888; }
        .action-tab-icon.clear-bin:hover { color: #fff; }
        .action-tab-icon.delete-x { color: var(--accent-red); }

        .control-panel {
            background: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 0 12px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--line-color);
            width: 95%;
            max-width: 1500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .panel-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-panel input {
            background: #000;
            border: 1px solid var(--line-color);
            color: #fff;
            padding: 10px 16px;
            border-radius: 6px;
            outline: none;
            width: 220px;
            font-weight: bold;
        }
        .control-panel input:focus { border-color: #666; }

        .filter-tabs {
            display: flex;
            gap: 4px;
            background: #000;
            padding: 4px;
            border-radius: 6px;
            border: 1px solid var(--line-color);
        }

        .filter-btn {
            background: transparent;
            border: none;
            color: #666;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .filter-btn.active {
            background: #222;
            color: #fff;
        }

        .btn-action {
            background: #fff;
            border: none;
            color: #000;
            padding: 11px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-action:hover { background: #e0e0e0; }

        .bracket-arena {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px 10px;
            width: 100%;
            max-width: 1700px;
        }

        #connector-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .side { display: flex; align-items: center; z-index: 2; }
        .column { display: flex; flex-direction: column; justify-content: space-around; height: 950px; }
        .left-side .column { margin-right: 65px; }
        .right-side .column { margin-left: 65px; }

        .match-node {
            display: flex;
            flex-direction: column;
            background-color: var(--card-bg);
            border: 1px solid var(--line-color);
            border-radius: 8px;
            padding: 5px;
            gap: 5px;
        }

        .team-slot {
            width: var(--slot-width);
            height: var(--slot-height);
            background: #0a0a0a;
            border-radius: 4px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
            font-size: 1rem;
            cursor: pointer;
            overflow: hidden;
            border: 1px solid var(--line-color);
            transition: all 0.15s;
            box-sizing: border-box;
            position: relative;
        }

        .team-slot.active-target {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .flag-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .flag-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Representasi Bendera Garis/Syal khusus Klub */
        .club-flag-mock {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .club-text-overlay {
            position: absolute;
            font-size: 0.65rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 1px 1px 3px #000, -1px -1px 3px #000;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        .team-slot.eliminated {
            opacity: 0.15;
            filter: grayscale(100%);
            border-color: #222;
        }

        .center-stage { display: flex; flex-direction: column; align-items: center; gap: 40px; z-index: 2; }
        
        .champion-podium {
            background: #111;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 20px 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }
        .champion-podium .team-slot { 
            width: 85px; 
            height: 55px; 
            border-color: #fff;
            font-size: 1.3rem;
            background: #000;
        }

        .pool-section {
            background-color: var(--panel-bg);
            border: 1px solid var(--line-color);
            border-radius: 12px;
            padding: 20px;
            width: 95%;
            max-width: 1500px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .pool-grid { 
            display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
            max-height: 280px; overflow-y: auto; padding: 10px; background: #000; border-radius: 6px;
            border: 1px solid var(--line-color);
        }
        .pool-item {
            display: flex; position: relative; align-items: center; justify-content: center;
            border-radius: 4px; width: 68px; height: 46px; overflow: hidden;
            cursor: pointer; transition: transform 0.1s; box-sizing: border-box;
            border: 1px solid #222;
        }
        .pool-item:hover { transform: scale(1.08); border-color: #fff; z-index: 10; }
    </style>
</head>

            {id:"LIV", n:"LIVERPOOL", t:"UEFA", colors:["#c8102e","#00b06a","#c8102e"], init:"LIV"},
            {id:"ARS", n:"ARSENAL", t:"UEFA", colors:["#ef0107","#fff","#ef0107"], init:"ARS"},
            {id:"INT", n:"INTER MILAN", t:"UEFA", colors:["#001c55","#000000","#001c55"], init:"INT"},
            {id:"MIL", n:"AC MILAN", t:"UEFA", colors:["#e32119","#000000","#e32119"], init:"MIL"},

            {id:"MUN", n:"MANCHESTER UNITED", t:"UEFA", colors:["#da291c","#ffe500","#da291c"], init:"MUN"},
            {id:"CHE", n:"CHELSEA", t:"UEFA", colors:["#034694","#fff","#034694"], init:"CHE"},

            // --- AFC CLUB FLAGS ---
            {id:"HIL", n:"AL HILAL SFC", t:"AFC", colors:["#0053a0","#fff","#0053a0"], init:"HIL"},
            {id:"NAS", n:"AL NASSR FC", t:"AFC", colors:["#fff200","#0053a0","#fff200"], init:"NAS"},
            {id:"ITT", n:"AL ITTIHAD", t:"AFC", colors:["#000","#ffcc00","#000"], init:"ITT"},
            {id:"PRB", n:"PERSIB BANDUNG", t:"AFC", colors:["#005ba9","#fff","#005ba9"], init:"PRB"},
            {id:"pjm", n:"PERSEBAYA SURABAYA", t:"AFC", colors:["#007a3d","#fff","#007a3d"], init:"PJM"},
            {id:"psm", n:"PERS_JA_JA_KARTA", t:"AFC", colors:["#e00000","#ffcc00","#e00000"], init:"PSM"},
            {id:"JDT", n:"JOHOR DARUL TA'ZIM", t:"AFC", colors:["#002060","#ff3b30","#002060"], init:"JDT"},
            {id:"YFM", n:"YOKOHAMA F. MARINOS", t:"AFC", colors:["#002f6c","#e60012","#fff"], init:"YFM"},

            // --- CAF CLUB FLAGS ---
            {id:"AHL", n:"AL AHLY SC", t:"CAF", colors:["#cc0000","#000","#cc0000"], init:"AHL"},
            {id:"ZAM", n:"ZAMALEK SC", t:"CAF", colors:["#fff","#cc0000","#fff"], init:"ZAM"},
            {id:"MSD", n:"MAMELODI SUNDOWNS", t:"CAF", colors:["#ffcc00","#008040","#ffcc00"], init:"MSD"},
            {id:"WAC", n:"WYDAD AC", t:"CAF", colors:["#e2001a","#fff","#e2001a"], init:"WAC"},
            {id:"RCA", n:"RAJA CASABLANCA", t:"CAF", colors:["#008040","#fff","#008040"], init:"RCA"},
            {id:"TPM", n:"TP MAZEMBE", t:"CAF", colors:["#000","#fff","#000"], init:"TPM"}
        ];

        let selectedSlot = null;
        let activePoolFilter = 'ALL';
        let predictionTabs = { "Prediksi Utama": {} }; 
        let activeTabName = "Prediksi Utama";

        // Render visual bendera negara via API / CSS Banner dinamis untuk klub
        function createBadgeHTML(teamObj) {
            if (teamObj.t === 'NATION') {
                return `
                    <div class="flag-container">
                        <img class="flag-img" src="https://flagcdn.com/64x48/${teamObj.iso}.png" alt="${teamObj.n}">
                        <div class="club-text-overlay">${teamObj.id}</div>
                    </div>
                `;
            } else {
                // Skema bendera/syal klub sepak bola horizontal split
                const c = teamObj.colors;
                return `
                    <div class="flag-container">
                        <div class="club-flag-mock">
                            <div style="flex:1; background:${c[0]};"></div>
                            <div style="flex:1; background:${c[1]};"></div>
                            <div style="flex:1; background:${c[2]};"></div>
                        </div>
                        <div class="club-text-overlay">${teamObj.init}</div>
                    </div>
                `;
            }
        }

        function renderTabsHeader() {
            const container = document.getElementById('tabs-header-box');
            const createBtn = container.querySelector('.btn-create-tab');
            container.innerHTML = '';
            
            Object.keys(predictionTabs).forEach(tabName => {
                const btn = document.createElement('button');
                btn.className = `tab-button ${tabName === activeTabName ? 'active' : ''}`;
                btn.innerHTML = `
                    <span onclick="switchTab('${tabName}')">⚫ ${tabName}</span>
                    <div class="tab-actions-wrapper">
                        <span class="action-tab-icon clear-bin" title="Reset Opsi" onclick="clearSpecificTab('${tabName}')">⟲</span>
                        ${Object.keys(predictionTabs).length > 1 ? `<span class="action-tab-icon delete-x" title="Hapus Tab" onclick="deleteTab('${tabName}')">✕</span>` : ''}
                    </div>
                `;
                container.appendChild(btn);
            });
            container.appendChild(createBtn);
        }

        function createNewTab() {
            const name = prompt("Buat nama opsi simulasi baru:", `Prediksi ${Object.keys(predictionTabs).length + 1}`);
            if (name && name.trim() !== "") {
                if (predictionTabs[name]) { alert("Nama opsi tab ini sudah ada!"); return; }
                predictionTabs[name] = {};
                activeTabName = name;
                saveAllTabsState();
                renderTabsHeader();
                clearVisualBracket();
                setTimeout(drawLines, 50);
            }
        }

        function switchTab(tabName) {
            activeTabName = tabName;
            renderTabsHeader();
            loadActiveTabToVisual();
            setTimeout(drawLines, 50);
        }

        function clearSpecificTab(tabName) {
            if (confirm(`Kosongkan isi seluruh prediksi pada tab "${tabName}"?`)) {
                predictionTabs[tabName] = {};
                if (tabName === activeTabName) clearVisualBracket();
                saveAllTabsState();
            }
        }

        function deleteTab(tabName) {
            if (confirm(`Hapus tab "${tabName}" secara permanen?`)) {
                delete predictionTabs[tabName];
                if (activeTabName === tabName) activeTabName = Object.keys(predictionTabs)[0];
                saveAllTabsState();
                renderTabsHeader();
                loadActiveTabToVisual();
                setTimeout(drawLines, 50);
            }
        }

        function setPoolFilter(filterType) {
            activePoolFilter = filterType;
            filterAndRenderPool();
        }

        function filterAndRenderPool() {
            const searchVal = document.getElementById('countryInput').value.trim().toUpperCase();
            let filtered = masterDatabase;

            if (activePoolFilter !== 'ALL') filtered = filtered.filter(item => item.t === activePoolFilter);
            if (searchVal !== '') filtered = filtered.filter(item => item.n.includes(searchVal) || item.id.includes(searchVal));

            const grid = document.getElementById('global-pool-grid');
            grid.innerHTML = '';
            
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'pool-item';
                div.innerHTML = createBadgeHTML(item);
                div.addEventListener('click', () => {
                    if (selectedSlot) setSlotTeam(selectedSlot, item);
                    else alert("Klik salah satu slot kosong '?' di bagan atas dulu bro!");
                });
                grid.appendChild(div);
            });
        }

        document.getElementById('countryInput').addEventListener('input', filterAndRenderPool);

        document.querySelectorAll('.drop-zone').forEach(slot => {
            slot.addEventListener('click', () => {
                document.querySelectorAll('.drop-zone').forEach(s => s.classList.remove('active-target'));
                selectedSlot = slot; slot.classList.add('active-target');
                document.getElementById('countryInput').focus();
            });

            slot.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                if (slot.getAttribute('data-team-id')) {
                    slot.classList.toggle('eliminated');
                    saveActiveTabState();
                }
            });
        });

        function generateNextRound() {
            const sides = ['L', 'R'];
            sides.forEach(side => {
                for (let round = 1; round <= 4; round++) {
                    const currentNodes = document.querySelectorAll(`.${side === 'L' ? 'left-side' : 'right-side'} .column[data-round="${round}"] .match-node`);
                    currentNodes.forEach((node, index) => {
                        const slots = node.querySelectorAll('.team-slot');
                        if (slots.length === 2) {
                            const slot1 = slots[0], slot2 = slots[1];
                            const id1 = slot1.getAttribute('data-team-id'), id2 = slot2.getAttribute('data-team-id');

                            let winnerId = null;
                            if (id1 && !slot1.classList.contains('eliminated') && slot2.classList.contains('eliminated')) winnerId = id1;
                            else if (id2 && !slot2.classList.contains('eliminated') && slot1.classList.contains('eliminated')) winnerId = id2;

                            if (winnerId) {
                                const teamObj = masterDatabase.find(t => t.id === winnerId);
                                if (teamObj) {
                                    if (round < 4) {
                                        const nextRoundIndex = Math.floor(index / 2) + 1;
                                        const nextSlotPosition = (index % 2) + 1;
                                        const targetNode = document.querySelectorAll(`.${side === 'L' ? 'left-side' : 'right-side'} .column[data-round="${round + 1}"] .match-node`)[nextRoundIndex - 1];
                                        if (targetNode) setSlotTeam(targetNode.querySelectorAll('.team-slot')[nextSlotPosition - 1], teamObj);
                                    } else if (round === 4) {
                                        setSlotTeam(document.getElementById('CHAMP'), teamObj);
                                    }
                                }
                            }
                        }
                    });
                }
            });
            saveActiveTabState();
        }

        function setSlotTeam(slotElement, teamObj) {
            if (!slotElement) return;
            slotElement.innerHTML = createBadgeHTML(teamObj);
            slotElement.setAttribute('data-team-id', teamObj.id);
            slotElement.classList.remove('eliminated');
            saveActiveTabState();
        }

        function saveActiveTabState() {
            const state = {};
            document.querySelectorAll('.drop-zone').forEach(slot => {
                const teamId = slot.getAttribute('data-team-id');
                state[slot.id] = { id: teamId || null, isEliminated: slot.classList.contains('eliminated') };
            });
            predictionTabs[activeTabName] = state;
            saveAllTabsState();
        }

        function saveAllTabsState() {
            localStorage.setItem('football_black_engine_data', JSON.stringify({ tabs: predictionTabs, active: activeTabName }));
        }

        function loadActiveTabToVisual() {
            clearVisualBracket();
            const state = predictionTabs[activeTabName] || {};
            Object.keys(state).forEach(id => {
                const slot = document.getElementById(id);
                if (slot && state[id].id) {
                    const teamObj = masterDatabase.find(t => t.id === state[id].id);
                    if (teamObj) {
                        slot.innerHTML = createBadgeHTML(teamObj);
                        slot.setAttribute('data-team-id', teamObj.id);
                        if (state[id].isEliminated) slot.classList.add('eliminated');
                    }
                }
            });
        }

        function clearVisualBracket() {
            document.querySelectorAll('.drop-zone').forEach(slot => {
                slot.innerHTML = slot.id === 'CHAMP' ? '🏆' : '?';
                slot.removeAttribute('data-team-id');
                slot.classList.remove('eliminated');
            });
        }

        function drawLines() {
            const svg = document.getElementById('connector-svg'); 
            if (!svg) return; 
            svg.innerHTML = '';
            const arenaRect = document.getElementById('arena').getBoundingClientRect();

            const createTreePath = (side, fromRound, toRound) => {
                const fromNodes = document.querySelectorAll(`.${side === 'L' ? 'left-side' : 'right-side'} .column[data-round="${fromRound}"] .match-node`);
                const toNodes = document.querySelectorAll(`.${side === 'L' ? 'left-side' : 'right-side'} .column[data-round="${toRound}"] .match-node`);
                
                fromNodes.forEach((node, idx) => {
                    const targetNode = toNodes[Math.floor(idx / 2)];
                    if (node && targetNode) {
                        const rA = node.getBoundingClientRect(), rB = targetNode.getBoundingClientRect();
                        let x1 = (side === 'L') ? (rA.right - arenaRect.left) : (rA.left - arenaRect.left);
                        let y1 = (rA.top + rA.height / 2) - arenaRect.top;
                        let x2 = (side === 'L') ? (rB.left - arenaRect.left) : (rB.right - arenaRect.left);
                        let y2 = (rB.top + rB.height / 2) - arenaRect.top;
                        const midX = x1 + (x2 - x1) / 2;
                        
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', `M ${x1} ${y1} H ${midX} V ${y2} H ${x2}`);
                        path.setAttribute('stroke', 'var(--line-color)'); 
                        path.setAttribute('stroke-width', '2'); 
                        path.setAttribute('fill', 'none');
                        svg.appendChild(path);
                    }
                });
            };

            for(let r=1; r<=3; r++) { 
                createTreePath('L', r, r+1); 
                createTreePath('R', r, r+1); 
            }
        }

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('football_black_engine_data');
            if (saved) {
                const parsed = JSON.parse(saved);
                predictionTabs = parsed.tabs || { "Prediksi Utama": {} };
                activeTabName = parsed.active || "Prediksi Utama";
            }
            renderTabsHeader();
            filterAndRenderPool();
            loadActiveTabToVisual();
            setTimeout(drawLines, 300);
        });
        window.addEventListener('resize', drawLines);
    </script>
